key_findings:
  - YouTube A/B testing explicitly excludes Shorts — no native support
  - FullCalendar v6 JSON feed maps directly to our ScheduledJob dataclass
  - beautiful-captions (PyPI) is production-ready; pycaps is alpha
  - Chart.js + SSE is the standard pattern for real-time dashboards
  - Our dashboard.py already has SSE — Chart.js is ~50 lines of JS to add

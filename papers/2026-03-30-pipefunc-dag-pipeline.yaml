summary: |
  Decorator-based function pipeline (DAG) creation in pure Python.
  Automatic execution order handling.
  Zero infrastructure overhead — no server, no database.
  Pattern: @pipefunc decorator auto-wires function inputs/outputs.
  Relevant pattern for MPV2 pipeline orchestrator module.

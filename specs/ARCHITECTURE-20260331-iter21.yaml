  files_modified:
    - src/dashboard.py
    - src/templates/dashboard.html
  files_created:
    - src/templates/_health_panel.html  # Jinja2 partial fragment
  changes:
    dashboard_py:
      - action: "Add GET /api/health/partial endpoint"
        location: "After _get_pipeline_module_health() ~line 165"
        details: |
          New endpoint renders _health_panel.html partial template with
          pipeline_health data. Returns HTMLResponse. ~10 lines.
      - action: "Register Jinja2 partial template"
        location: "In create_app() where jinja_env is created"
        details: "Already uses FileSystemLoader(templates_dir) — partials auto-discovered."
    dashboard_html:
      - action: "Add hx-trigger + hx-get to Pipeline Modules card"
        location: "Line 75, the #pipeline-health-panel div"

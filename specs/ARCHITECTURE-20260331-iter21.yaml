    - "Test /api/health/partial includes status badges"
    - "Test dashboard.html has hx-trigger attribute"
    - "Test dashboard.html includes partial template"

# H66: SIGTERM Graceful Shutdown
h66_sigterm_handler:
  files_modified:
    - src/pipeline_health.py
  changes:
    pipeline_health_py:
      - action: "Add _shutdown_called flag to __init__"
        location: "Line 140, after _atexit_registered"
        details: "self._shutdown_called: bool = False"
      - action: "Add _sigterm_handler and _sigint_handler methods"
        location: "After _atexit_save() ~line 241"
        details: |
          def _sigterm_handler(self, signum, frame):
              self._graceful_shutdown()
          def _graceful_shutdown(self):
              if self._shutdown_called: return
              self._shutdown_called = True
              self._atexit_save()
      - action: "Register signal handlers in report_health()"
        location: "Lines 221-226, alongside atexit registration"
        details: |
          try:
              signal.signal(signal.SIGTERM, self._sigterm_handler)
              signal.signal(signal.SIGINT, self._sigint_handler)
          except (OSError, ValueError):
              pass  # not main thread or signal not available
      - action: "Guard _atexit_save with _shutdown_called"
        location: "Line 236"
        details: "Check _shutdown_called to prevent double-save"
  tests:
    - "Test SIGTERM handler registration on first report_health()"
    - "Test SIGINT handler registration on first report_health()"
    - "Test _shutdown_called prevents double save"
    - "Test _graceful_shutdown calls save"
    - "Test signal registration failure is silent (non-main thread)"
    - "Test atexit_save respects _shutdown_called"

# H67: Config-Driven auto_save_interval
h67_config_autosave:
  files_modified:
    - src/config.py
    - src/pipeline_health.py
    - config.example.json
  changes:
    config_py:
      - action: "Add get_pipeline_health_auto_save_interval() getter"
        location: "End of file, after get_seo_platforms()"
        details: |
          def get_pipeline_health_auto_save_interval() -> int:
              val = _get("pipeline_health_auto_save_interval", 10)
              return max(1, min(int(val), 10000))
    pipeline_health_py:
      - action: "Use config getter as default in __init__"
        location: "Line 126"
        details: |
          Change default from _AUTO_SAVE_INTERVAL to config getter:
          if auto_save_interval == _AUTO_SAVE_INTERVAL:
              try:
                  from config import get_pipeline_health_auto_save_interval
                  auto_save_interval = get_pipeline_health_auto_save_interval()
              except (ImportError, Exception):
                  pass
    config_example_json:
      - action: "Add pipeline_health_auto_save_interval key"
        details: "Add to config.example.json with default 10"
  tests:
    - "Test get_pipeline_health_auto_save_interval returns config value"
    - "Test get_pipeline_health_auto_save_interval defaults to 10"
    - "Test PipelineHealthMonitor uses config value"
    - "Test PipelineHealthMonitor explicit param overrides config"

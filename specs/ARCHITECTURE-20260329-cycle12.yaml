## Data Flow

### H38 (export_optimizer)
```
source_path → get_video_info() → _calculate_crop() → build ffmpeg cmd → subprocess.run() → output_path
```

### H39 (smart_clipper)
```
candidates → sorted by start_time → for each: trim_clip(video, output, start, end) → output_paths
```

### H40 (publisher)
```
PublishJob → score_content() → if flagged: block/warn → platform dispatch → add_to_history()
```

## Implementation Order
All 3 are independent. Implement in parallel:
1. H38: export_optimizer.py + test_export_optimizer.py
2. H39: smart_clipper.py + test_smart_clipper.py
3. H40: publisher.py + test_publisher.py

## Out of Scope
- YouTube.py coverage push (iteration 13)
- Shoppable content (YouTube has no API; TikTok requires partner approval)
- Multi-language dubbing (GPU-dependent)
- New file creation (all changes are to existing files)
- ffmpeg_utils.py modifications (H38 uses it as-is + direct subprocess for combo filters)

## H40: Wire uniqueness_scorer into publisher

### Component: src/publisher.py (publish method)
- **Current**: publish() validates job → iterates platforms → publish → track analytics → webhook
- **Change**: Add uniqueness check BEFORE platform iteration:
  1. Import `UniquenessScorer` from `uniqueness_scorer`
  2. Add `uniqueness_mode` config option: 'block', 'warn', or 'off' (default: 'warn')
  3. In publish(), before platform loop:
     - Call `scorer.score_content(title, script="", tags, description)`
     - If mode='block' and flagged: return early with all PublishResult(success=False, error_type='UniquenessBlocked')
     - If mode='warn' and flagged: log warning, add `uniqueness_flagged=True` to result details
     - After successful publish: call `scorer.add_to_history(...)` to update rolling history
  4. Script field: publisher doesn't have script text — use description as proxy,
     or add optional `script` field to PublishJob

### Implementation approach
```python
class ContentPublisher:
    def __init__(self):
        self._retry_failed = get_retry_failed()
        self._max_retries = get_max_retries()
        self._uniqueness_mode = _get_publisher_config().get("uniqueness_mode", "warn")

    def publish(self, job: PublishJob) -> list:
        # ... existing validation ...

        # Pre-publish uniqueness check
        uniqueness_result = self._check_uniqueness(job)
        if uniqueness_result is not None:
            return uniqueness_result  # blocked

        # ... existing platform loop ...

        # Post-publish: add to history
        self._update_uniqueness_history(job)

        return results
```

### PublishJob extension
- Add optional `script: str = ""` field to PublishJob dataclass
- This is backward-compatible (default empty string)
- Uniqueness scorer uses description as fallback if script is empty

### Config extension
```json
{
  "publisher": {
    "uniqueness_mode": "warn",  // "block", "warn", or "off"
    ...
  }
}
```

### Test changes: tests/test_publisher.py
- Add tests for uniqueness check: block mode, warn mode, off mode
- Test with flagged content (mock scorer to return flagged=True)
- Test with passing content (mock scorer to return flagged=False)
- Test history update after successful publish
- Test graceful fallback when uniqueness_scorer import fails
- 15+ new tests


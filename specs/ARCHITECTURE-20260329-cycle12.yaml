## H39: Wire ffmpeg_utils into smart_clipper

### Component: src/smart_clipper.py (split_clips method only)
- **Current**: split_clips() imports `scenedetect.video_splitter.split_video_ffmpeg`,
  `scenedetect.open_video`, `scenedetect.frame_timecode.FrameTimecode`, converts
  ClipCandidates to FrameTimecode pairs, calls split_video_ffmpeg()
- **Change**: Replace with loop calling `ffmpeg_utils.trim_clip()` per candidate:
  1. Remove imports: split_video_ffmpeg, is_ffmpeg_available, open_video, FrameTimecode
  2. Import: `from ffmpeg_utils import trim_clip, check_ffmpeg`
  3. For each candidate: call `trim_clip(video_path, output_path, start, end, codec='copy')`
  4. Build output filenames from template (replace PySceneDetect template vars)

### Implementation approach
```python
def split_clips(self, video_path, candidates, output_dir=".", filename_template="..."):
    from ffmpeg_utils import trim_clip, check_ffmpeg

    if not check_ffmpeg():
        raise RuntimeError("ffmpeg is not available...")

    os.makedirs(output_dir, exist_ok=True)
    sorted_candidates = sorted(candidates, key=lambda c: c.start_time)
    output_paths = []

    for i, candidate in enumerate(sorted_candidates, 1):
        # Build filename from template
        video_name = os.path.splitext(os.path.basename(video_path))[0]
        filename = filename_template.replace("$VIDEO_NAME", video_name)
        filename = filename.replace("$SCENE_NUMBER", f"{i:03d}")
        filename = filename.replace("$START_TIME", f"{candidate.start_time:.1f}")
        filename = filename.replace("$END_TIME", f"{candidate.end_time:.1f}")
        output_path = os.path.join(output_dir, f"{filename}.mp4")

        trim_clip(video_path, output_path, candidate.start_time, candidate.end_time, codec='copy')
        output_paths.append(output_path)

    return output_paths
```

### Key simplification
- No more FrameTimecode conversion (float seconds → trim_clip directly)
- No more open_video() call just to get fps
- No more split_video_ffmpeg() wrapping — direct trim per candidate
- detect_scenes() still uses scenedetect (only split_clips changes)

### Test changes: tests/test_smart_clipper.py
- Update split_clips test mocks: replace scenedetect mocks with ffmpeg_utils mocks
- Existing 62 tests: most are for detect_scenes/transcribe/merge/score — unchanged
- The ~11 split_clips tests need mock target updates
- Add 10+ new tests for template variable substitution, ffmpeg error handling


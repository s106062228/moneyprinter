## H38: Wire ffmpeg_utils into export_optimizer

### Component: src/export_optimizer.py
- **Current**: optimize_clip() lazy-imports MoviePy, uses VideoFileClip → cropped → resized → subclipped → write_videofile
- **Change**: Replace MoviePy chain with ffmpeg_utils calls:
  1. Use `ffmpeg_utils.get_video_info()` to get source dimensions (replaces `VideoFileClip(source_path); clip.size`)
  2. Use `ffmpeg_utils.transcode()` with FFmpeg filter chain for crop+scale+trim in one pass
  3. The crop calculation (`_calculate_crop()`) is pure math — keep unchanged
  4. Build an FFmpeg `-vf` filter: `crop=w:h:x:y,scale=tw:th` + optional `-t duration`
  5. Remove `from moviepy import VideoFileClip, CompositeVideoClip` lazy import

### FFmpeg filter chain design
```
# Current MoviePy chain (4 separate operations):
clip = VideoFileClip(source_path)          # decode
clip = clip.cropped(x1, y1, x2, y2)       # crop
clip = clip.resized((target_w, target_h))  # scale
clip = clip.subclipped(0, max_duration)    # trim
clip.write_videofile(output, codec, audio_codec)  # encode

# New FFmpeg single-pass equivalent:
ffmpeg -y -i source_path \
  -vf "crop=new_w:new_h:x1:y1,scale=target_w:target_h" \
  -t max_duration \
  -c:v libx264 -c:a aac \
  output_path
```

### Implementation approach
- Add a new private method `_ffmpeg_optimize()` that builds the FFmpeg command
- `optimize_clip()` calls `_ffmpeg_optimize()` instead of MoviePy chain
- Use `ffmpeg_utils.get_video_info()` to get source dimensions
- Use `subprocess.run()` directly for the combined filter (ffmpeg_utils.transcode()
  doesn't support `-vf crop+scale` combo — need direct subprocess call or extend transcode)
- Actually: add a `crop` parameter to the subprocess command construction inline,
  since this is a one-off combination. Keep it in export_optimizer, not ffmpeg_utils.

### Key risk mitigation
- FFmpeg crop uses `crop=w:h:x:y` (width, height, x-offset, y-offset from top-left)
- MoviePy crop uses `cropped(x1, y1, x2, y2)` (coordinates)
- Translation: x_offset = x1 = cx - new_w/2, y_offset = y1 = cy - new_h/2
- Need to ensure even pixel dimensions (FFmpeg libx264 requires even w/h)


  - task: "H21-2: Migrate combine() method (set_→with_, crop→cropped, volumex→MultiplyVolume, TextClip args)"
    blocks: "H21-3"
  - task: "H21-3: Write tests for MoviePy v2 migration"
    blocks: nothing
  - task: "H22-1: Add _get_auth() and --token flag to mcp_server.py"
    blocks: "H22-2"
  - task: "H22-2: Write tests for MCP HTTP auth"
    blocks: nothing
  - task: "Run full test suite (839+ tests)"
    blocks: nothing

out_of_scope:
  - "Content calendar UI (H23) — deferred unless H21+H22 complete quickly"
  - "YouTube.py refactoring beyond MoviePy migration — no restructuring"
  - "MCP OAuth 2.1 provider setup — only BearerTokenAuth this iteration"
  - "ImageMagick removal from config.py — get_imagemagick_path() stays for now"
  - "Font discovery/fallback for systems without fonts/ dir"

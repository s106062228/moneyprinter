title: "Architecture — 2026-03-29 (Iteration 13)"
scope: "Implementing experiments for H41, H42, H43"

components:
  - name: "GPU-Accelerated FFmpeg (H41)"
    location: "src/ffmpeg_utils.py"
    changes:
      - "Add detect_gpu() function: probe nvidia-smi + ffmpeg -encoders for h264_nvenc"
      - "Add _GPU_CODECS constant: frozenset({h264_nvenc, hevc_nvenc})"
      - "Expand _SUPPORTED_CODECS to include h264_nvenc, hevc_nvenc"
      - "Add _build_hwaccel_flags() helper: returns ['-hwaccel', 'cuda', '-hwaccel_output_format', 'cuda'] or []"
      - "Modify trim_clip(): accept use_gpu=False kwarg; insert hwaccel flags before -i when True + GPU available"
      - "Modify transcode(): accept use_gpu=False kwarg; swap libx264->h264_nvenc when use_gpu=True + GPU available; add -preset p4 for nvenc"
      - "Modify concat_clips(): accept use_gpu=False kwarg; same pattern"
      - "All GPU paths: try GPU first, on failure retry CPU (silent fallback logged at DEBUG)"
    test_strategy:
      - "Mock subprocess.run for nvidia-smi and ffmpeg -encoders in detect_gpu tests"
      - "Test trim/transcode/concat with use_gpu=True: verify -hwaccel cuda flags in cmd"
      - "Test GPU fallback: first subprocess call fails, second succeeds (CPU path)"
      - "Test use_gpu=False: no GPU flags regardless of detect_gpu result"
      - "Test detect_gpu=False: use_gpu=True still works (CPU fallback)"
      - "All existing tests unchanged: default use_gpu=False preserves behavior"
    target_tests: 30
    target_coverage: ">90%"

  - name: "Video Perceptual Hashing in UniquenessScorer (H42)"
    location: "src/uniqueness_scorer.py"
    changes:
      - "Add _VIDEO_WEIGHT = 0.15; rebalance: title=0.25, script=0.25, metadata=0.17, regularity=0.18, video=0.15"
      - "Add _score_video_similarity(video_path, history) -> float helper"
      - "Modify score_content(): accept optional video_path=None kwarg"
      - "When video_path provided and videohash importable: compute hash, compare Hamming distance vs history hashes"
      - "When video_path=None or videohash not installed: use text-only weights (existing behavior)"
      - "Modify add_to_history(): accept optional video_path=None; store video_hash in entry"
      - "Lazy import: try import videohash inside _score_video_similarity, catch ImportError"
      - "UniquenessScore dataclass: add video_similarity field (Optional[float] = None)"
    test_strategy:
      - "Mock videohash.VideoHash to return controlled hash_hex values"
      - "Test score_content with video_path: verify video_similarity dimension scored"
      - "Test score_content without video_path: verify text-only weights (backward compat)"
      - "Test videohash not installed: verify graceful fallback to text-only"
      - "Test add_to_history with video_path: verify video_hash stored"
      - "Test Hamming distance calculation with known hash pairs"
      - "All existing tests unchanged: video_path=None is the default"
    target_tests: 25
    target_coverage: ">85%"

  - name: "Fix Trend Detector Test Failures (H43)"
    location: "tests/test_trend_detector.py"
    changes:
      - "Add pytest.importorskip('pandas') at top of each of 5 test functions that import pandas"
      - "Lines 299, 331, 347, 363, 1010: wrap 'import pandas as pd' with importorskip"
      - "Alternative: single pandas = pytest.importorskip('pandas') at class level with skipif marker"
    test_strategy:
      - "Run full test suite: 0 failures expected (was 5)"
      - "Verify no tests deleted, only skip guards added"
    target_tests: 0 new (fix existing)
    target_coverage: "unchanged"

data_flow:
  h41: "user code calls trim_clip(use_gpu=True) -> detect_gpu() probes system -> _build_hwaccel_flags() generates cmd flags -> subprocess.run(ffmpeg with GPU flags) -> on failure, retry with CPU flags -> return output_path"
  h42: "user calls score_content(video_path='clip.mp4') -> _score_video_similarity() lazy-imports videohash -> VideoHash(path=video_path).hash_hex -> Hamming distance vs history hashes -> weighted into overall score"
  h43: "pytest collects test_trend_detector.py -> importorskip('pandas') skips 5 tests if pandas not installed -> 0 failures"


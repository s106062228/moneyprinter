title: "Journal — Iteration 16 (2026-03-30)"
date: "2026-03-30"
iteration: 16

survey_findings:
  - "Plugin systems: pluggy (pytest's plugin framework) is the best fit for MPV2 — lightweight, hook-based, proven at scale. Stevedore is overkill."
  - "Video analytics: YouTube Data API v3, TikTok-Api (unofficial), SocialKit (commercial) for cross-platform engagement. Local metrics collection is the right first step."
  - "Dubbing: LatentSync v1.5 (ByteDance) and MuseTalk are leading open-source lip sync models. Linly-Dubbing provides complete pipeline reference."
  - "Competitors: AutoShorts.ai and AutoFaceless.ai are main commercial competitors. ShortGPT is closest open-source."
  - "Rate limiting: Ad-hoc time.sleep() patterns in webhooks.py, publisher.py — centralized rate limiter fills an architectural gap."


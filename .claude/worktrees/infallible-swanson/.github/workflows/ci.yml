name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests + Coverage (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd src && python -m pytest ../tests/ -v --tb=short \
            --cov=. --cov-report=term-missing --cov-report=xml:../coverage.xml \
            --cov-config=../.coveragerc

      - name: Enforce coverage threshold
        run: |
          cd src && python -m pytest ../tests/ -q --no-header \
            --cov=. --cov-config=../.coveragerc --cov-fail-under=40

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

      - name: Syntax check all Python files
        run: |
          python -m py_compile src/config.py
          python -m py_compile src/validation.py
          python -m py_compile src/analytics.py
          python -m py_compile src/cache.py
          python -m py_compile src/mp_logger.py
          python -m py_compile src/llm_provider.py
          python -m py_compile src/status.py
          python -m py_compile src/retry.py

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (SAST)
        run: |
          bandit -r src/ -ll -ii --format json --output bandit-report.json || true
          bandit -r src/ -ll -ii

      - name: Check dependencies for vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --output json > safety-report.json 2>/dev/null || true
          safety check || true

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: |
          ruff check src/ --select E,F,W --ignore E501,F403,F405,E402 || true
